  <style>

    .loadingdata{font-size: 15px; font-weight: bold;}

    .hidden {display: none;}

    :root {--page-footer-height: 0px;}
    
    .side-menu-overlay {position: fixed; inset: 0; background: rgba(0,0,0,0.35);

    .side-menu {position: fixed; top: 0; left: 0; width: 280px;

    .side-menu hr {border: none; border-top: 1px solid #e0e0e0; margin: 0;}
  </style>

  <script type="module">
    import { SUPABASE_ANON_KEY } from "./p.js";  
    const supabaseUrl = "https://mzvlybnvgpemdayoylfk.supabase.co";  
    window.supabase = supabase.createClient(
      supabaseUrl,

  <!-- Inline JS for dropdowns & logout -->
  <script>
    document.getElementById("currentYear").textContent = new Date().getFullYear();

   let businessId = null;

    document.addEventListener("DOMContentLoaded", () => {
        const business = JSON.parse(sessionStorage.getItem("businessProfile"));

        if (!business || !business.businessid) {
          window.location.href = "index.html";
          return;
        }

        businessId = business.businessid; // ✅ IMPORTANT FIX

        const businessName = business.businessname || "Biz";
        document.getElementById("businessName").textContent = businessName;
        window.businessProfile = business;
    });

    function openSideMenu() {
      document.getElementById("sideMenu").classList.add("show");
      document.getElementById("sideMenuOverlay").classList.add("show");
    }

    function closeSideMenu() {
      document.getElementById("sideMenu").classList.remove("show");
      document.getElementById("sideMenuOverlay").classList.remove("show");
    }

    function toggleUserDropdown() {
      document.getElementById("userDropdown").classList.toggle("show");
    }

    function logout() {
      sessionStorage.clear();
      window.location.href = "index.html";
    }

    window.onload = () => {
      // Disable back button after logout
      if (!sessionStorage.getItem("loggedIn")) {
        window.location.replace("index.html");
      }
    }
  
    window.onclick = function(event) {
      if (!event.target.closest('.user-icon') && !event.target.closest('.user-dropdown')) {
        document.getElementById("userDropdown").classList.remove("show");
      }
    }

    const skeleton = document.getElementById("salesSkeleton");
    const salesContainer = document.getElementById("salesContainer");

    window.addEventListener("load", () => {
        document.getElementById("pageLoader").style.display = "none";
          // Show skeleton, hide real contentq
          skeleton.classList.remove("hidden");
          salesContainer.classList.add("hidden");

        // Simulate loading for professionalism
        setTimeout(async () => {
          // first populate the UI with real data
          await fetchSales(); // wait until data is fully loaded and UI built

          // then hide skeleton and show the real content
          skeleton.classList.add("hidden");
          salesContainer.classList.remove("hidden");
        }, 2000); // 2 seconds loading simulation
      });

      // Optional global control for Supabase calls
      function showLoader() {
        document.getElementById("pageLoader").style.display = "flex";
      }

      function hideLoader() {
        document.getElementById("pageLoader").style.display = "none";
      }
      
      let sales = []; // this will be populated from your DB
      let groupedSales = {};
      let filteredQuery = "";
      let rawSales = []; // always stores the latest fresh data

      function getOneYearRange() {
        const now = new Date();

        const start = new Date(now);
        start.setUTCFullYear(start.getUTCFullYear() - 1);
        start.setUTCHours(0, 0, 0, 0);

        const end = new Date(now);
        end.setUTCDate(end.getUTCDate() + 1); // ⬅️ move to tomorrow
        end.setUTCHours(0, 0, 0, 0);          // ⬅️ start of tomorrow (UTC)

        return {
          start: start.toISOString(),
          end: end.toISOString()
        };
      }

      async function fetchAllSalesInRange(start, end) {
        const pageSize = 1000;
        let from = 0;
        let all = [];

        while (true) {
          const { data, error } = await supabase
            .from("sales")
            .select("*")
            .eq("businessid", businessId)
            .gte("created_at", start)
            .lt("created_at", end)
            .order("created_at", { ascending: false })
            .range(from, from + pageSize - 1);

          if (error) throw error;
          if (!data.length) break;

          all.push(...data);

          if (data.length < pageSize) break;
          from += pageSize;
        }

        return all;
      }


      async function fetchSales() {
        try {
          const { start, end } = getOneYearRange();

          const data = await fetchAllSalesInRange(start, end);

          sales = data.map(sale => {
            const dateObj = new Date(`${sale.sale_date}T${sale.time_sold}`);

            return {
              item_name: sale.item_name,
              type: sale.item_type,
              quantity: sale.quantity,
              stock_amount: sale.stock_amount,
              price: sale.selling_amount,
              profit: sale.profit,
              payment_mode: sale.mode_of_payment?.toLowerCase() || "cash", // canonical
              payment_label:
                sale.mode_of_payment?.toLowerCase() === "mpesa"
                  ? "Mobile Payment"
                  : "Cash",

              datetime: dateObj,

              // 🔥 precomputed search keys
              dayKey: dateObj.toLocaleDateString("en-GB"),          // 26/07/2025
              dayName: dateObj.toLocaleDateString("en-GB", { weekday: "long" }).toLowerCase(),
              timeKey: dateObj.toLocaleTimeString("en-GB", {
                hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false
              })
            };
          });

          rawSales = sales;
          groupSalesByDate();

          return sales;
        } catch (err) {
          console.error("Error fetching paginated sales:", err);
          return [];
        }
      }
       
      function groupSalesByDate() {
        groupedSales = {};

        sales.forEach(sale => {
          const dayKey = sale.dayKey;
          const timeKey = sale.timeKey;

          if (!dayKey || !timeKey) return; // 🛡 safety

          if (!groupedSales[dayKey]) groupedSales[dayKey] = {};
          if (!groupedSales[dayKey][timeKey]) groupedSales[dayKey][timeKey] = [];

          groupedSales[dayKey][timeKey].push(sale);
        });
      }

      function renderSales() {
        const container = document.getElementById("salesContainer");
        container.innerHTML = "";

        const sortedDays = Object.keys(groupedSales).sort((a, b) => {
          const [d1, m1, y1] = a.split("/").map(Number);
          const [d2, m2, y2] = b.split("/").map(Number);
          return new Date(y2, m2 - 1, d2) - new Date(y1, m1 - 1, d1);
        });

        if (sortedDays.length === 0) {
        const notFound = document.createElement("div");
        notFound.className = "not-found-message";
        notFound.innerHTML = `
          <div style="text-align: center; padding: 40px; color: #555;">
            <div style="margin-top: 10px; font-size: 16px;">
              No sales records yet. Make your first sale and view your records here.
            </div>
          </div>
        `;
          container.appendChild(notFound);
          return;
        }

        sortedDays.forEach(day => {
          const dayBox = document.createElement("div");
          dayBox.className = "day-box";
          dayBox.dataset.day = day.toLowerCase();
          dayBox.dataset.dayname = getDayName(day)?.toLowerCase() || "";

          const dayHeader = document.createElement("div");
          dayHeader.className = "day-header";
          dayHeader.innerHTML = `<h2>${getDayName(day)} ${day}</h2>
            <button class="download-btn">Download Report</button>`;
            dayHeader.querySelector(".download-btn").addEventListener("click", () => {
            const summary = calculateDailySummary(timeBlocks);
            downloadSalesReport(day, timeBlocks, summary);
          });

          dayBox.appendChild(dayHeader);

          const timeBlocks = groupedSales[day];
          const sortedTimes = Object.keys(timeBlocks).sort();

          sortedTimes.forEach((time, index) => {
          const saleCard = document.createElement("div");
          saleCard.className = "sale-card";

          const saleHeader = document.createElement("div");
          saleHeader.className = "sale-header";
          saleHeader.innerHTML = `<span>Sale ${index + 1}</span><span>${time}</span>`;
          saleCard.appendChild(saleHeader);

          const tableWrapper = document.createElement("div");
          tableWrapper.className = "sale-table-wrapper";

          const table = document.createElement("table");
          table.className = "sale-table";

          const fields = ["Item", "Type", "Quantity", "Stock Amount", "Price", "Profit", "Payment"];
          const fieldKeys = [
            "item_name", "type", "quantity",
            "stock_amount", "price", "profit", "payment_label"
          ];

          // Create thead
          const thead = document.createElement("thead");
          const headerRow = document.createElement("tr");
          fields.forEach(field => {
            const th = document.createElement("th");
            th.textContent = field;
            headerRow.appendChild(th);
          });
          thead.appendChild(headerRow);

          // Create tbody
          const tbody = document.createElement("tbody");
          timeBlocks[time].forEach(sale => {
            const tr = document.createElement("tr");
            fieldKeys.forEach(key => {
              const td = document.createElement("td");
              td.textContent = sale[key];
              tr.appendChild(td);
            });
            tbody.appendChild(tr);
          });

          table.appendChild(thead);
          table.appendChild(tbody);
          tableWrapper.appendChild(table);
          saleCard.appendChild(tableWrapper);

          const footer = document.createElement("div");
          footer.className = "sale-footer";
          footer.innerHTML = `<button class="receipt-btn">Receipt</button>`;

          footer.querySelector(".receipt-btn").addEventListener("click", () => {
            openReceiptPopup(timeBlocks[time]);
          });

          saleCard.appendChild(footer);
          dayBox.appendChild(saleCard);
          });

          const summary = calculateDailySummary(timeBlocks);
          const dayFooter = document.createElement("div");
          dayFooter.className = "daily-footer";

          // Create heading
          const heading = document.createElement("h3");
          heading.textContent = "Daily Calculations";
          dayFooter.appendChild(heading);

          // Create table
          const summaryTable = document.createElement("table");
          summaryTable.className = "summary-table";

          // First row: Main titles
          const titleRow = document.createElement("tr");
          ["Total Sales", "Stock Amount", "Profit"].forEach(title => {
            const th = document.createElement("th");
            th.colSpan = 2;
            th.textContent = title;
            titleRow.appendChild(th);
          });
          summaryTable.appendChild(titleRow);

          // Second row: Combined totals (Cash + Mpesa)
          const totalsRow = document.createElement("tr");
          [
            summary.totalSales.cash + summary.totalSales.mpesa,
            summary.totalStock.cash + summary.totalStock.mpesa,
            summary.totalProfit.cash + summary.totalProfit.mpesa
          ].forEach(total => {
            const td = document.createElement("td");
            td.colSpan = 2;
            td.textContent = `${total}`;
            totalsRow.appendChild(td);
          });
          summaryTable.appendChild(totalsRow);

          // Third row: Subheaders
          const subHeaderRow = document.createElement("tr");
          ["Cash", "Mobile Payment", "Cash", "Mobile Payment", "Cash", "Mobile Payment"].forEach(label => {
            const th = document.createElement("th");
            th.textContent = label;
            subHeaderRow.appendChild(th);
          });
          summaryTable.appendChild(subHeaderRow);

          // Fourth row: Sub-values
          const valuesRow = document.createElement("tr");
          [
            summary.totalSales.cash, summary.totalSales.mpesa,
            summary.totalStock.cash, summary.totalStock.mpesa,
            summary.totalProfit.cash, summary.totalProfit.mpesa
          ].forEach(amount => {
            const td = document.createElement("td");
            td.textContent = `${amount}`;
            valuesRow.appendChild(td);
          });
          summaryTable.appendChild(valuesRow);

          // Append table to footer
          const summaryWrapper = document.createElement("div");
          summaryWrapper.className = "summary-wrapper"; // 👈 Give it a scrollable class
          summaryWrapper.appendChild(summaryTable);

          dayFooter.appendChild(summaryWrapper); // ⬅️ wrap this instead of table directly

          dayBox.appendChild(dayFooter);
          container.appendChild(dayBox);
        });
      }

      function getDayName(dateStr) {
        const [d, m, y] = dateStr.split("/").map(Number);
        const dayIndex = new Date(y, m - 1, d).getDay();
        return ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"][dayIndex];
      }

      function renderSummaryColumn(title, data) {
        return `
          <div class="category">
            <h4>${title}</h4>
            <p>Cash: Ksh ${data.cash}</p>
            <p>Mpesa: Ksh ${data.mpesa}</p>
          </div>
        `;
      }

      function calculateDailySummary(salesByTime) {
        let totalSales = { cash: 0, mpesa: 0 };
        let totalStock = { cash: 0, mpesa: 0 };
        let totalProfit = { cash: 0, mpesa: 0 };

        Object.values(salesByTime).forEach(saleGroup => {
          saleGroup.forEach(sale => {
            const mode = sale.payment_mode; // already normalized
            if (!totalSales.hasOwnProperty(mode)) return;
            totalSales[mode] += Number(sale.price) || 0;
            totalStock[mode] += Number(sale.stock_amount) || 0;
            totalProfit[mode] += Number(sale.profit) || 0;
          });
        });

        return {
          totalSales,
          totalStock,
          totalProfit
        };
      }

      function debounce(fn, delay = 150) {
        let t;
        return (...args) => {
          clearTimeout(t);
          t = setTimeout(() => fn(...args), delay);
        };
      }

      document.addEventListener("DOMContentLoaded", async () => {
        rawSales = await fetchSales(); // initial fetch
        groupSalesByDate(); // uses rawSales
        renderSales();      // render all

        const salesSearchInput = document.getElementById("salesSearch");

        salesSearchInput.addEventListener("input", e => {
          const term = e.target.value.toLowerCase().trim();
          let found = false;

          document.querySelectorAll(".day-box").forEach(dayBox => {
            const day = dayBox.dataset.day;
            const dayName = dayBox.dataset.dayname;

            const match =
              term === "" ||
              day.includes(term) ||
              dayName.includes(term);

            dayBox.style.display = match ? "" : "none";
            if (match) found = true;
          });

          document.querySelector(".not-found-message")?.remove();

          if (!found && term !== "") {
            const container = document.getElementById("salesContainer");
            const notFound = document.createElement("div");
            notFound.className = "not-found-message";
            notFound.innerHTML = `
              <div style="text-align:center;padding:40px;color:#555">
                <div style="font-size:100px;">🕵️‍♂️</div>
                <div style="margin-top:10px;font-size:20px;">
                  Oops! No sale records found for your search.
                </div>
              </div>
            `;
            container.appendChild(notFound);
          }
        });
        });


      function openReceiptPopup(salesList) {
        const popup = document.getElementById("receiptPopup");
        const body = document.getElementById("receiptBody");
        popup.classList.remove("hidden");

        // Loading state
        body.innerHTML = `<p class="loading-text">Generating receipt...</p>`;

        setTimeout(() => {
          const paymentMode = salesList[0].payment_label || "N/A";
          const firstSaleDate = new Date(salesList[0].datetime);
          const dayName = firstSaleDate.toLocaleDateString("en-GB", { weekday: "long" }); // e.g., Saturday
          const dateOnly = firstSaleDate.toLocaleDateString("en-GB"); // e.g., 29/07/2025
          const timeOnly = firstSaleDate.toLocaleTimeString("en-GB", {
            hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false
          }); // e.g., 11:08:05

          const {businessname, location, county, country, phone, description} = window.businessProfile;

          let grandTotal = 0;

          let receiptHTML = `
            <div style="text-align: center;">
              <h2>${businessname}</h2>
              <p>${location}</p>
              <p>${county}, ${country}</p>
              <p>Tel: ${phone}</p>
              <p>${description}</p>
              <h2>RECEIPT</h2>
            </div>
            <hr style="margin: 10px 0;" />
            <table style="width:100%; border-collapse: collapse; font-size: 14px;">
              <thead>
                <tr>
                  <th style="text-align: left; padding: 8px;">Qty</th>
                  <th style="text-align: left; padding: 8px;">Item</th>
                  <th style="text-align: right; padding: 8px;">Unit Price</th>
                  <th style="text-align: right; padding: 8px;">Total</th>
                </tr>
              </thead>
              <tbody>`;

          salesList.forEach(sale => {
            const total = Number(sale.price); // already total price
            const unitPrice = total / Number(sale.quantity); // correct unit price
            grandTotal += total;

            receiptHTML += `
              <tr>
                <td style="text-align: left; padding: 8px;">${sale.quantity}</td>
                <td style="text-align: left; padding: 8px;">${sale.item_name}</td>
                <td style="text-align: right; padding: 8px;">${unitPrice.toFixed(2)}</td>
                <td style="text-align: right; padding: 8px;">${total.toFixed(2)}</td>
              </tr>`;
          });

          receiptHTML += `
              </tbody>
            </table>

            <hr style="margin: 10px 0;" />
              <p class="receipt-total" style="font-size:16px;font-weight:bold;">
                Total: Ksh. ${grandTotal.toFixed(2)}
              </p>

              <p class="receipt-payment">
                <strong>Payment Mode:</strong> ${paymentMode}
              </p>

              <p class="receipt-datetime">
                <strong>Day:</strong> ${dayName} | <strong>Date:</strong> ${dateOnly} | <strong>Time:</strong> ${timeOnly}
              </p>
           <hr style="margin: 10px 0;" />
            <p style="text-align:center; margin-top: 20px;">Thank you and welcome again!</p>`;

          body.innerHTML = receiptHTML;
        }, 500);
      }

      function closeReceiptPopup() {
        document.getElementById("receiptPopup").classList.add("hidden");
      }

      function extractReceiptData() {
        const rows = [...document.querySelectorAll("#receiptBody tbody tr")];

        const items = rows.map(row => {
          const cells = row.querySelectorAll("td");
          return {
            qty: cells[0].textContent.trim(),
            item: cells[1].textContent.trim(),
            unit: cells[2].textContent.trim(),
            total: cells[3].textContent.trim()
          };
        });

        const clean = el => el?.textContent.replace(/\s+/g, " ").trim() || "";

        const total = clean(document.querySelector("#receiptBody .receipt-total"));
        const payment = clean(document.querySelector("#receiptBody .receipt-payment"));
        const datetime = clean(document.querySelector("#receiptBody .receipt-datetime"));

        return { items, total, payment, datetime };
      }

      function printReceipt() {
        const doc = generateReceiptPDF();

        const pdfBlob = doc.output("blob");
        const blobUrl = URL.createObjectURL(pdfBlob);

        const printWindow = window.open(blobUrl);

        if (!printWindow) {
          alert("Please allow popups to print receipts.");
          return;
        }

        printWindow.onload = () => {
          printWindow.focus();
          printWindow.print();
        };
      }

      function generateReceiptPDF() {
        const {businessname, location, county, country, phone, description} = window.businessProfile;

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF("p", "mm", "a4");
        const pageWidth = doc.internal.pageSize.width;
        
        let y = 15;

        doc.setFont("courier", "bold");
        doc.setFontSize(15);
        doc.text(businessname, pageWidth / 2, y, { align: "center" });

        y += 5;
        doc.setFont("courier", "normal");
        doc.setFontSize(10);
        doc.text(location, pageWidth / 2, y, { align: "center" });
        y += 5;
        doc.text(`${county}, ${country}`, pageWidth / 2, y, { align: "center" });
        y += 5;
        doc.text(`Tel: ${phone}`, pageWidth / 2, y, { align: "center" });
        y += 5;
        doc.text(description, pageWidth / 2, y, { align: "center" });

        y += 8;
        doc.setFont("courier", "bold");
        doc.setFontSize(15);
        doc.text("RECEIPT", pageWidth / 2, y, { align: "center" });

        y += 5;
        doc.line(15, y, pageWidth - 15, y);
        y += 5;

        const { items, total, payment, datetime } = extractReceiptData();

        doc.autoTable({
          startY: y,
          theme: "plain",
          margin: { left: 15, right: 15 },
          head: [["Qty", "Item", "Unit Price", "Total"]],
          body: items.map(i => [i.qty, i.item, i.unit, i.total]),
          styles: { font: "courier", fontSize: 12 },
          headStyles: { fontStyle: "bold" }
        });

        y = doc.lastAutoTable.finalY + 6;

        const tableX = doc.lastAutoTable?.startX ?? 15;

        doc.setFont("courier", "bold");
        doc.setFontSize(12);
        doc.text(total, tableX, y);

        y += 7;

        doc.setFont("courier", "normal");
        doc.setFontSize(12);
        doc.text(payment, tableX, y);

        y += 6;

        doc.text(datetime, tableX, y);

        y += 8;
        doc.line(15, y, pageWidth - 15, y);
        y += 6;

        doc.setFont("courier", "normal");
        doc.setFontSize(12);
        doc.text("Thank you and welcome again!", pageWidth / 2, y, { align: "center" });

        return doc;
      }

      function downloadReceipt() {
        showLoader();
        const doc = generateReceiptPDF();
        doc.save(`Receipt_${new Date().toISOString().slice(0, 10)}.pdf`);
        hideLoader();
      }

      function downloadSalesReport(day, salesByTime, summary) {
        const {businessname, location, county, country, phone, description} = window.businessProfile;

        showLoader();

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF("p", "mm", "a4");

        const pageWidth = doc.internal.pageSize.width;
        let y = 15;

        /* ===== HEADER ===== */
        doc.setFont("helvetica", "bold");
        doc.setFontSize(14);
        doc.text(businessname, pageWidth / 2, y, { align: "center" });

        y += 10;
        doc.setFontSize(13);
        doc.text("SALES RECORDS", pageWidth / 2, y, { align: "center" });

        y += 6;
        doc.setFont("helvetica", "normal");
        doc.setFontSize(10);

        const dayName = getDayName(day);
        doc.text(
          `Report For: ${dayName} ${day}`,
          pageWidth / 2,
          y,
          { align: "center" }
        );

        y += 6;
        doc.line(15, y, pageWidth - 15, y);
        y += 8;

        /* ===== SALES TABLE ===== */
        const tableBody = [];
        let saleCounter = 1;

        Object.keys(salesByTime)
          .sort()
          .forEach(time => {
            salesByTime[time].forEach(sale => {
              tableBody.push([
                saleCounter++,
                time,
                sale.item_name,
                sale.type,
                sale.quantity,
                sale.stock_amount,
                sale.price,
                sale.profit,
                sale.payment_label
              ]);
            });
          });

        doc.autoTable({
          startY: y,
          margin: { left: 15, right: 15 },
          theme: "grid",
          head: [[
            "Sale No",
            "Time",
            "Item",
            "Type",
            "Qty",
            "Stock",
            "Price",
            "Profit",
            "Payment"
          ]],
          body: tableBody,
          styles: { fontSize: 9 },
          headStyles: { fillColor: [0, 51, 102] },
          didDrawPage: data => {
            y = data.cursor.y + 10;
          }
        });

        /* ===== DAILY SUMMARY ===== */
        if (y > 230) {
          doc.addPage();
          y = 20;
        }

        doc.setFont("helvetica", "bold");
        doc.setFontSize(12);
        doc.text("Daily Calculations", 15, y);
        y += 5;

        doc.autoTable({
          startY: y,
          margin: { left: 15, right: 15 },
          theme: "grid",
          head: [[
            "Category",
            "Cash",
            "Mobile Payment",
            "Total"
          ]],
          body: [
            [
              "Total Sales",
              summary.totalSales.cash,
              summary.totalSales.mpesa,
              summary.totalSales.cash + summary.totalSales.mpesa
            ],
            [
              "Stock Amount",
              summary.totalStock.cash,
              summary.totalStock.mpesa,
              summary.totalStock.cash + summary.totalStock.mpesa
            ],
            [
              "Profit",
              summary.totalProfit.cash,
              summary.totalProfit.mpesa,
              summary.totalProfit.cash + summary.totalProfit.mpesa
            ]
          ],
          styles: { fontSize: 10 },
          headStyles: { fillColor: [0, 51, 102] }
        });

        doc.save(`Sales_Records_${day.replaceAll("/", "-")}.pdf`);
        hideLoader();
     }
  </script>
</body>
